<!-- public/offline.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — TrailBlaze CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f9fafb; color: #1a1a1a; padding: 20px; }
    .container { text-align: center; max-width: 400px; }
    .logo { width: 48px; height: 48px; background: #2b0548; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; color: #e1b3ee; font-weight: 600; font-size: 20px; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    .note { font-size: 12px; color: #999; padding: 12px; background: #f3f4f6; border-radius: 8px; }
    button { padding: 10px 24px; background: #2b0548; color: #e1b3ee; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #5a1890; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">TB</div>
    <h1>You're offline</h1>
    <p>TrailBlaze CRM needs an internet connection to work. Don't worry — any actions you took while offline have been saved and will sync automatically when you reconnect.</p>
    <button onclick="window.location.reload()">Try again</button>
    <div class="note" style="margin-top: 16px;">
      Tip: Your most recently viewed pages are cached and may still be accessible.
    </div>
  </div>
  <script>
    // Auto-reload when connection returns
    window.addEventListener('online', () => {
      window.location.reload()
    })
  </script>
</body>
</html>
